<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бюро</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap');
        
        html {
            scroll-behavior: smooth; /* Плавный скролл для всей страницы */
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: #f2e9dc;
            font-family: 'Courier Prime', Courier, monospace;
            overflow-x: hidden;
        }

        .bg-beige { background-color: #f2e9dc; }
        .bg-blue { background-color: #1a1bd1; }

        /* 1 в 1 слайд из презентации, на всю ширину экрана */
        .slide {
            width: 100vw;
            aspect-ratio: 16 / 9;
            position: relative;
            container-type: inline-size;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        .full-asset {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 1;
        }

        /* 1. КОНЦЕПЦИЯ - картинка на весь экран */
        #slide-concept {
            /* Убрали жесткую высоту 100vh, теперь он наследует 16:9, чтобы не обрезаться на телефонах */
            background-image: url('assets/image1.jpg');
            background-size: cover;
            background-position: center;
        }

        /* 2. ДЕКОР */
        #slide-decor .text {
            position: absolute;
            left: 10%;
            top: 45%;
            color: #1a1bd1;
            font-size: 10cqi;
            font-weight: normal;
            z-index: 3;
            letter-spacing: -0.1cqi;
        }
        #slide-decor img.squiggle {
            position: absolute;
            left: 10%; /* Выравниваем с текстом */
            top: 70%; /* Сдвигаем СИЛЬНО ниже, так как из-за поворота она растет вверх */
            height: 38cqi; 
            width: auto;
            transform: rotate(-90deg);
            transform-origin: left top;
            z-index: 1; /* Опускаем слой ниже текста */
        }
        #slide-decor img.chair {
            position: absolute;
            right: 25%; /* Сдвигаем немного правее, так как оно станет больше */
            bottom: 5%;
            height: 75%; /* Делаем кресло значительно крупнее */
            z-index: 5;
        }
        #slide-decor img.wardrobe {
            position: absolute;
            right: 5%;
            bottom: 5%;
            height: 85%;
            z-index: 3;
        }

        /* 3. ДРЕСС-КОД */
        #slide-dresscode .text {
            position: absolute;
            left: 40%; /* Возвращаем на левую сторону, чуть правее скобки */
            top: 13%; /* Возвращаем на уровень скобки */
            color: #ffffff;
            font-size: 6.5cqi; /* Идеальный размер, чтобы поместиться между [ и ] */
            z-index: 2;
            line-height: 1.40;
        }

        /* 4. ПРОДАКШН */
        #slide-production .beam {
            position: absolute;
            left: 18%;
            top: 15%;
            width: 100%;
            height: 70%;
            background-color: #1a1bd1;
            clip-path: polygon(0 40%, 100% 0, 100% 100%, 0 60%);
            z-index: 1;
        }
        #slide-production .text {
            position: absolute;
            left: 32%; /* Сдвинули правее, чтобы не перекрывалось прожектором */
            top: 50%;
            transform: translateY(-50%);
            color: #ffffff;
            font-size: 5cqi;
            z-index: 4; /* Текст поверх всего */
        }
        #slide-production img.spotlight {
            position: absolute;
            left: 2%;
            top: 50%;
            transform: translateY(-50%);
            height: 60%;
            z-index: 3;
        }

        /* 5. ЛАЙН-АП */
        #slide-lineup .text {
            position: absolute;
            right: 15%;
            top: 50%;
            transform: translateY(-50%);
            color: #ffffff;
            font-size: 6cqi;
            z-index: 2;
        }

        /* 6. ТОРТ */
        #slide-cake .blue-box {
            position: absolute;
            right: 15%;
            top: 40%;
            background-color: #1a1bd1;
            padding: 1cqi 2cqi;
            z-index: 2;
        }
        #slide-cake .text {
            color: #ffffff;
            font-size: 5.5cqi;
        }

        /* Галереи фото */
        .gallery-wrapper {
            width: 100vw;
            display: flex;
            justify-content: center;
            margin: 0;
            padding: 0;
        }
        .gallery-content {
            width: 100vw;
            display: flex;
            flex-direction: column;
            gap: 2vw; /* Зазоры между фото */
            padding: 2vw 0;
            margin: 0;
        }
        .gallery-content img {
            width: 100vw;
            height: auto;
            object-fit: contain;
            display: block;
            margin: 0;
            padding: 0;
        }

        /* Анимации появления */
        .fade-in {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94), transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <!-- Слайд 1: Concept -->
    <div id="slide-concept" class="slide">
    </div>
<div class="gallery-wrapper bg-beige"><div class="gallery-content">
    <img src="images\concept/cat_0.jpg" class="fade-in" alt="photo" loading="lazy">
    <img src="images\concept/cat_1.jpg" class="fade-in" alt="photo" loading="lazy">
    <img src="images\concept/cat_2.jpg" class="fade-in" alt="photo" loading="lazy">
</div></div>

    <!-- Слайд 2: Decor -->
    <div id="slide-decor" class="slide bg-beige">
        <div class="text">decor.</div>
        <img src="assets/image4.png" class="squiggle" alt="squiggle">
        <img src="assets/image3.png" class="chair" alt="chair">
        <img src="assets/image2.png" class="wardrobe" alt="wardrobe">
    </div>
<div class="gallery-wrapper bg-beige"><div class="gallery-content">
    <img src="images\decor/cat_0.jpg" class="fade-in" alt="photo" loading="lazy">
    <img src="images\decor/cat_1.jpg" class="fade-in" alt="photo" loading="lazy">
    <img src="images\decor/cat_2.jpg" class="fade-in" alt="photo" loading="lazy">
</div></div>

    <!-- Слайд 3: Dress-code -->
    <div id="slide-dresscode" class="slide bg-blue">
        <img src="assets/image5.png" class="full-asset" alt="dress-code silhouettes">
        <div class="text">dress-<br>code.</div>
    </div>
<div class="gallery-wrapper bg-blue"><div class="gallery-content">
    <img src="images\dresscode/cat_0.jpg" class="fade-in" alt="photo" loading="lazy">
    <img src="images\dresscode/cat_1.jpg" class="fade-in" alt="photo" loading="lazy">
    <img src="images\dresscode/cat_2.jpg" class="fade-in" alt="photo" loading="lazy">
</div></div>

    <!-- Слайд 4: Digital Production -->
    <div id="slide-production" class="slide bg-beige">
        <div class="beam"></div>
        <div class="text">digital production.</div>
        <img src="assets/image6.png" class="spotlight" alt="spotlight">
    </div>
<div class="gallery-wrapper bg-beige"><div class="gallery-content">
    <img src="images\production/cat_0.jpg" class="fade-in" alt="photo" loading="lazy">
    <img src="images\production/cat_1.jpg" class="fade-in" alt="photo" loading="lazy">
    <img src="images\production/cat_2.jpg" class="fade-in" alt="photo" loading="lazy">
</div></div>

    <!-- Слайд 5: Lineup -->
    <div id="slide-lineup" class="slide bg-blue">
        <img src="assets/image7.png" class="full-asset" alt="lineup silhouette">
        <div class="text">лайн-ап.</div>
    </div>
<div class="gallery-wrapper bg-blue"><div class="gallery-content">
    <img src="images\lineup/cat_0.jpg" class="fade-in" alt="photo" loading="lazy">
    <img src="images\lineup/cat_1.jpg" class="fade-in" alt="photo" loading="lazy">
    <img src="images\lineup/cat_2.jpg" class="fade-in" alt="photo" loading="lazy">
</div></div>

    <!-- Слайд 6: Cake -->
    <div id="slide-cake" class="slide bg-beige">
        <img src="assets/image8.png" class="full-asset" alt="wedding cake">
        <div class="blue-box">
            <span class="text">wedding cake.</span>
        </div>
    </div>
<div class="gallery-wrapper bg-beige"><div class="gallery-content">
    <img src="images\cake/cat_0.jpg" class="fade-in" alt="photo" loading="lazy">
    <img src="images\cake/cat_1.jpg" class="fade-in" alt="photo" loading="lazy">
    <img src="images\cake/cat_2.jpg" class="fade-in" alt="photo" loading="lazy">
</div></div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    // Настраиваем IntersectionObserver для появления элементов при скролле
    const observerOptions = {
        root: null,
        rootMargin: '0px',
        threshold: 0.15 // Элемент начнет появляться, когда 15% его будет видно
    };

    const observer = new IntersectionObserver((entries, observer) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                // Добавляем класс visible
                entry.target.classList.add('visible');
                // Перестаем следить, чтобы анимация сработала один раз
                observer.unobserve(entry.target);
            }
        });
    }, observerOptions);

    // Ищем все элементы с классом fade-in
    const fadeElements = document.querySelectorAll('.fade-in');
    
    // Добавляем небольшую задержку (stagger) для элементов внутри одного контейнера
    let delay = 0;
    fadeElements.forEach((el, index) => {
        // Если элементы идут подряд (например, сетка фото), делаем их появление по очереди
        if (index > 0 && el.parentElement === fadeElements[index-1].parentElement) {
            delay += 150; // задержка 150ms между соседними фото
        } else {
            delay = 0;
        }
        el.style.transitionDelay = delay + 'ms';
        observer.observe(el);
    });
});

// Плавный скролл (Lenis)
const script = document.createElement('script');
script.src = 'https://unpkg.com/lenis@1.1.2/dist/lenis.min.js';
script.onload = () => {
    const lenis = new Lenis({
        duration: 1.2,
        easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
        direction: 'vertical',
        gestureDirection: 'vertical',
        smooth: true,
        mouseMultiplier: 1,
        smoothTouch: false,
        touchMultiplier: 2,
        infinite: false,
    });

    function raf(time) {
        lenis.raf(time);
        requestAnimationFrame(raf);
    }
    requestAnimationFrame(raf);
};
document.body.appendChild(script);

</script>
</body>
</html>
